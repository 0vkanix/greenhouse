services:
  db:
    image: postgres:18-alpine
    env_file:
      - .env
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - 5432:5432
    volumes:
      - greenlight_data:/var/lib/postgresql
      - ./migrations/docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build:
      context: .
      dockerfile: build/package/Dockerfile
    ports:
      - ${API_PORT}:${API_PORT}
    command:
      [
        "-port=${API_PORT}",
        "-db-dsn=postgres://${APP_DB_USER}:${APP_DB_PASSWORD}@db/${POSTGRES_DB}?sslmode=disable",
        "-db-max-open-conns=${DB_MAX_OPEN_CONNS}",
        "-db-max-idle-conns=${DB_MAX_IDLE_CONNS}",
        "-db-max-idle-time=${DB_MAX_IDLE_TIME}",
      ]
    depends_on:
      db:
        condition: service_healthy
    environment:
      - GREENLIGHT_DB_DSN=postgres://${APP_DB_USER}:${APP_DB_PASSWORD}@db/${POSTGRES_DB}?sslmode=disable

volumes:
  greenlight_data:
