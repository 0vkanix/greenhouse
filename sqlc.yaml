version: "2"
sql:
  # --- Movie Domain ---
  - name: "movie"
    engine: "postgresql"
    schema: "migrations/"
    queries: "internal/movie/queries.sql"
    gen:
      go:
        package: "movie"
        out: "internal/movie/"
        sql_package: "pgx/v5"
        emit_json_tags: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - column: "movies.created_at"
            go_type:
              import: "time"
              type: "Time"
            go_struct_tag: 'json:"-"'
          - column: "movies.year"
            go_struct_tag: 'json:"year,omitzero"'
          - column: "movies.runtime"
            go_type:
              type: "Runtime"
            go_struct_tag: 'json:"runtime,omitzero"'
          - column: "movies.genres"
            go_struct_tag: 'json:"genres,omitzero"'
